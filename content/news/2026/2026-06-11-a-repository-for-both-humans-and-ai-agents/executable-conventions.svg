<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="A written convention becomes a guard test that passes green when in sync or fails red naming the fix">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow2)">
    <line x1="212" y1="110" x2="262" y2="110"/>
    <line x1="452" y1="98" x2="552" y2="58"/>
    <line x1="452" y1="122" x2="552" y2="162"/>
  </g>
  <rect x="22" y="80" width="190" height="60" rx="9" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="117" y="106" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">A convention</text>
  <text x="117" y="125" text-anchor="middle" font-size="11.5" fill="#64748b">written down once</text>
  <rect x="262" y="80" width="190" height="60" rx="9" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="357" y="106" text-anchor="middle" font-size="13.5" font-weight="600" fill="#5b21b6">A guard test</text>
  <text x="357" y="125" text-anchor="middle" font-size="11.5" fill="#7c3aed">runs in CI on every PR</text>
  <rect x="552" y="28" width="246" height="58" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="675" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">green: code &amp; docs in sync</text>
  <text x="675" y="71" text-anchor="middle" font-size="11.5" fill="#15803d">the convention still holds</text>
  <rect x="552" y="134" width="246" height="58" rx="9" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="675" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">red: names the exact fix</text>
  <text x="675" y="177" text-anchor="middle" font-size="11.5" fill="#b91c1c">drift can't be merged</text>
</svg>
