version: 2
updates:
  - package-ecosystem: github-actions
    directory: /.github/workflows
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /astro
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      all-npm:
        patterns:
          - "*"
