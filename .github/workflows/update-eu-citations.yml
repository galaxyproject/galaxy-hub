name: Update EU Citations
on:
  workflow_dispatch:
  schedule:
    - cron: '00 23 * * 0'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install bibtexparser Pyzotero==1.5.25

      - name: Run update script
        run: python scripts/update-eu-citations.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(eu): update citations'
          title: 'Update EU Citations'
          body: 'Auto-generated PR with updated citations for [Galaxy EU](https://usegalaxy.eu).'
          branch: update-eu-citations
          delete-branch: true
